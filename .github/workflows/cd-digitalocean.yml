# cd-digitalocean.yml — deploy FaaS control plane to DO Droplet on push to main.
#
# Prerequisites (GitHub repo Settings → Secrets):
#   DO_SSH_KEY  — ed25519 private key (generated by bootstrap.sh)
#   DO_HOST     — Droplet public IPv4
#
# What it does:
#   1. Cross-compiles all daemons for linux/amd64
#   2. SCPs binaries + migrations to the Droplet
#   3. Runs pending DB migrations
#   4. Restarts all FaaS services
#
# The existing ci.yml must pass first (needs: [test] from ci.yml).

name: cd-digitalocean

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger for debugging

concurrency:
  group: cd-do-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to DO Droplet
    runs-on: ubuntu-latest
    # Only deploy if the CI workflow's test job succeeded.
    # If ci.yml doesn't exist yet or the test job name differs, remove this.
    # needs: test
    if: github.repository == 'poyrazK/faas'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile for linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 make build
          GOOS=linux GOARCH=amd64 go build -o bin/migrate ./cmd/migrate

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload binaries
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            bin/apid bin/schedd bin/gatewayd bin/imaged bin/meterd \
            bin/githubd bin/faas bin/migrate \
            root@${{ secrets.DO_HOST }}:/opt/faas/bin/

      - name: Run migrations & restart services
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.DO_HOST }} 'bash -s' << 'REMOTE'
          set -euo pipefail

          # Run pending migrations as faas user.
          su - faas -s /bin/bash -c \
            "DATABASE_URL='postgres:///faas?host=/run/postgresql&user=faas' /opt/faas/bin/migrate"

          # Restart all FaaS services.
          for svc in apid schedd gatewayd imaged meterd githubd; do
            systemctl restart "faas-${svc}.service" || true
          done

          # Quick smoke test.
          sleep 3
          curl -sf http://127.0.0.1:8081/healthz > /dev/null \
            && echo "✓ apid healthy" \
            || echo "⚠ apid not responding"
          REMOTE

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' \
            "http://${{ secrets.DO_HOST }}:8080/healthz" || echo 000)
          echo "Gateway healthz: HTTP ${STATUS}"
          if [[ "${STATUS}" != "200" ]]; then
            echo "::warning::Gateway healthz returned ${STATUS}"
          fi
