# cd-digitalocean.yml — deploy FaaS control plane to DO Droplet on push to main.
#
# Prerequisites (GitHub repo Settings → Secrets):
#   DO_SSH_KEY  — ed25519 private key (generated by bootstrap.sh)
#   DO_HOST     — Droplet public IPv4
#
# What it does:
#   1. Cross-compiles all daemons for linux/amd64
#   2. SCPs binaries + migrations to the Droplet
#   3. Runs pending DB migrations
#   4. Restarts all FaaS services
#
# The existing ci.yml must pass first (needs: [test] from ci.yml).

name: cd-digitalocean

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger for debugging

concurrency:
  group: cd-do-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to DO Droplet
    runs-on: ubuntu-latest
    # Only deploy if the CI workflow's test job succeeded.
    # If ci.yml doesn't exist yet or the test job name differs, remove this.
    # needs: test
    if: github.repository == 'poyrazK/faas'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile for linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 make build
          GOOS=linux GOARCH=amd64 go build -o bin/migrate ./cmd/migrate

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload binaries to temporary directory
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.DO_HOST }} "mkdir -p /opt/faas/bin/deploy-tmp /opt/faas/bin/deploy-tmp/migrations"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            bin/apid bin/schedd bin/gatewayd bin/imaged bin/meterd \
            bin/githubd bin/faas bin/migrate \
            root@${{ secrets.DO_HOST }}:/opt/faas/bin/deploy-tmp/
          # Also ship migrations/*.sql so the v14/v19 prod backfill
          # (see 'Install binaries, run migrations & restart services')
          # can `psql -f` the same SQL that's embedded in the binary.
          # TODO(remove-once-prod-clean): drop this scp once the
          # backfill heredoc below is gone.
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            migrations/*.sql \
            root@${{ secrets.DO_HOST }}:/opt/faas/bin/deploy-tmp/migrations/

      - name: Install binaries, run migrations & restart services
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.DO_HOST }} 'bash -s' << 'REMOTE'
          set -euo pipefail

          # Safely overwrite running binaries using 'install' (unlinks old files)
          for bin in apid schedd gatewayd imaged meterd githubd faas migrate; do
            install -m 0755 /opt/faas/bin/deploy-tmp/$bin /opt/faas/bin/$bin
          done

          # TODO(remove-once-prod-clean): backfill slots v14 + v19 that
          # prod's goose_db_version is missing (PR #103, follow-up to
          # PR #102's merge). PR #83 era left prod at v13 -> v15
          # without a v14 row; PR #102 renumbered 00020_gdpr_requests.sql
          # -> 00019_gdpr_requests.sql so prod now also lacks v19. Both
          # SQL files are idempotent (CREATE TABLE IF NOT EXISTS /
          # CREATE INDEX IF NOT EXISTS), and the version-row INSERTs
          # use ON CONFLICT DO NOTHING, so re-running is safe. Once
          # an operator confirms prod has rows for v14 AND v19, every
          # EXISTS check below is a no-op — remove this block and
          # the matching migrations/*.sql scp above.
          backfill_slot() {
            local version="$1" sql_file="$2"
            local present
            present=$(su - faas -s /bin/bash -c \
              "psql -At -d faas -c \"SELECT EXISTS (SELECT 1 FROM goose_db_version WHERE version_id = ${version})\"" \
              2>/dev/null) || present=""
            if [ "$present" = "t" ]; then
              echo "✓ v${version} already recorded, skipping"
              return 0
            fi
            echo "→ Backfilling v${version} (${sql_file##*/})"
            su - faas -s /bin/bash -c \
              "psql -v ON_ERROR_STOP=1 -d faas -f ${sql_file}"
            su - faas -s /bin/bash -c \
              "psql -v ON_ERROR_STOP=1 -d faas -c \"
                 INSERT INTO goose_db_version (version_id, is_applied)
                 VALUES (${version}, true) ON CONFLICT DO NOTHING;\""
            echo "✓ v${version} backfilled"
          }
          backfill_slot 14 /opt/faas/bin/deploy-tmp/migrations/00014_cli_auth_codes.sql
          backfill_slot 19 /opt/faas/bin/deploy-tmp/migrations/00019_gdpr_requests.sql
          # END TODO(remove-once-prod-clean)

          rm -rf /opt/faas/bin/deploy-tmp

          # Run pending migrations as faas user.
          su - faas -s /bin/bash -c \
            "DATABASE_URL='postgres:///faas?host=/run/postgresql&user=faas' /opt/faas/bin/migrate"

          # Restart all FaaS services.
          for svc in apid schedd gatewayd imaged meterd githubd; do
            systemctl restart "faas-${svc}.service" || true
          done

          # Quick smoke test.
          # Probes gatewayd (loopback :8080), not apid directly — spec §11
          # binds apid to loopback-only, and gatewayd reverse-proxies /healthz
          # onto apid. So this exercises the full proxy chain end-to-end
          # (issue #85 PR 1 + PR 2).
          sleep 3
          curl -sf http://127.0.0.1:8080/healthz > /dev/null \
            && echo "✓ Gateway healthy (apid reachable via loopback proxy)" \
            || echo "⚠ Gateway not responding"
          REMOTE

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' \
            "http://${{ secrets.DO_HOST }}:8080/healthz" || echo 000)
          echo "Gateway healthz: HTTP ${STATUS}"
          if [[ "${STATUS}" != "200" ]]; then
            echo "::warning::Gateway healthz returned ${STATUS}"
          fi
