name: codeql

# GitHub-native SAST. Free for public repos; runs on push + weekly cron.
# The Query pack is 'security-and-quality' — covers both vulns and code
# smells. We omit JavaScript/Python because there's no JS/Python in this
# repo (yet).
#
# Reference: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/customizing-code-scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Sunday 02:00 UTC. Off the workload peak. SARIF artefacts
    # appear under Security > Code scanning.
    - cron: "0 2 * * SUN"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
          - language: go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Initializes the CodeQL CLI, runs autobuild, and uploads SARIF.
      # Pin the major version (v3) — CodeQL ships breaking changes between
      # major bumps; v3 has been stable for the duration of this milestone.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # 'security-and-quality' adds lint-style checks (unpinned
          # dependencies, etc.) on top of pure security queries.
          queries: security-and-quality

      # 'autobuild' detects the build system. For Go: `go build ./...`.
      # For 'actions' (workflow yaml): no build step needed.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          # category names the alert category in the SARIF upload.
          category: "/language:${{ matrix.language }}"
