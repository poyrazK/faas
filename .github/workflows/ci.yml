name: ci

# One-PR CI bundle (Tier 1+2 from the CI improvement plan):
#   - go-version pinned via go.mod
#   - go mod + build cache (setup-go@v5)
#   - concurrency cancel-in-progress (PR head ref)
#   - golangci-lint (catches errcheck, staticcheck, ineffassign beyond go vet)
#   - govulncheck (Go vulnerability DB scan)
#   - Codecov coverage (project gate >= 70%; informational patch)
#   - workflow_dispatch on the metal job (manual trigger from Actions tab)
#   - status badge in README, PR template for milestone gating
#
# Dependabot (.github/dependabot.yml) and CodeQL (.github/workflows/codeql.yml)
# live as separate files alongside this one.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs when a PR ref updates (push to the same branch)
# or main receives a new commit. Saves CI minutes and removes the
# "did my fix actually run?" confusion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Codecov + CodeQL need write to attach comments / SARIF uploads.
  # Each restricted here so the default-`read` token isn't open.
  pull-requests: write
  security-events: write

env:
  GO_VERSION: "1.25"
  # vacuum is the OpenAPI ruleset linter used by `make spec-check`.
  # Both the version and the SHA-256 pin are mirrored from the upstream
  # checksum file at https://github.com/daveshanley/vacuum/releases — never
  # bump one without the other. The Makefile also has a `make spec-install`
  # guard for local devs; CI uses the binary download because the
  # `go install` path cross-compiles vacuum from source on every run
  # (~3 min on a cold runner cache).
  VACUUM_VERSION: "0.29.10"
  VACUUM_SHA256_LINUX_AMD64: "84a596d5f88dd42f6f020376e5d2c2a29e6e51cc4b5614828f03dda122457a03"

jobs:
  # Default fast lane: lint + vet + unit + build + proto.
  # All gates that block PR merge live here.
  test:
    name: lint + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: faas
          POSTGRES_PASSWORD: faas
          POSTGRES_DB: faas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U faas -d faas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://faas:faas@localhost:5432/faas?sslmode=disable
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          # cache: true + cache-dependency-path is the canonical Go Actions
          # warm-cache idiom — shaves ~60s off every job on a non-first run.
          cache: true
          cache-dependency-path: go.sum

      # golangci-lint replaces bare gofmt + go vet with a curated set of
      # checks. v2.4.0+ is built with Go 1.25 and supports a go.mod
      # targeting Go 1.25 (golangci-lint v1.x is built with Go 1.23 and
      # refuses go.mod 'go 1.25.0' — see golangci/golangci-lint#5873).
      # action v8 requires golangci-lint >= v2.1.0; v9 is current.
      - name: lint (golangci-lint v8)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4.0
          args: --timeout=3m
          # Cache is built into the action; default cache key works.

      # govulncheck — Go's official vulnerability scanner. Runs against
      # go.mod's module graph, reports known CVEs in transitive deps.
      # Public surface = public attack surface; this gate is cheap.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # Re-runs the same checks golangci-lint covers as a fallback, in case
      # the lint step is skipped (e.g. workflow_dispatch with no Go file
      # changes). Keeps the existing local Makefile contract honest.
      - name: gofmt
        run: test -z "$(gofmt -l $(find . -name '*.go'))" || (gofmt -l $(find . -name '*.go'); exit 1)
      - name: vet
        run: go vet ./...
      - name: unit tests
        run: make test
      - name: build
        run: make build

      # promtool check rules — gate for spec §12 alert rules. Downloads
      # the same Prometheus release the ansible role pins
      # (deploy/ansible/roles/prometheus/defaults/main.yml:prom_version)
      # so the CI version is the production version. A broken rule
      # (typo in metric label, bad histogram_quantile, dangling
      # matcher) breaks the alert at boot, so we lint at PR time
      # instead of letting the operator find out via a 5 a.m. page
      # that never fires.
      #
      # Note: production SHA-256 pin (prom_release_sha256) is enforced
      # by the role's assert at bootstrap (`make bootstrap`), NOT here.
      # CI's job is to lint rule syntax, not to verify production
      # pinning — those are separate concerns.
      - name: promtool check rules
        run: |
          set -euo pipefail
          PROM_VERSION="2.54.1"
          PROM_TARBALL="prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          curl -fsSL -o "/tmp/${PROM_TARBALL}" \
            "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/${PROM_TARBALL}"
          tar -xzf "/tmp/${PROM_TARBALL}" -C /tmp "prometheus-${PROM_VERSION}.linux-amd64/promtool"
          sudo mv "/tmp/prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool check rules deploy/ansible/roles/prometheus/files/faas.rules.yml

      # Daemon smoke: every cmd/<daemon>/main.go is a one-box binary that wires
      # through pkg/wire.Daemon. `--help` must exit 0 with non-empty usage text
      # (a silent success here usually means init() truncated on a bad flag
      # spec). Catches nil-deref and broken flag wiring that `make build` alone
      # won't, in ~1 s. Mirrors the PR template checklist line `make build`.
      - name: daemon smoke (--help)
        run: |
          set -e
          for d in apid builderd faas gatewayd imaged meterd schedd vmmd; do
            out=$(./bin/$d --help 2>&1)
            if [ -z "$out" ]; then
              echo "::error::$d --help returned no output"
              exit 1
            fi
            printf '%-9s %4d bytes\n' "$d" "${#out}"
          done

      # M1+ (ADR-013): *.pb.go is checked in; this step verifies it's in sync
      # with the .proto sources. arduino/setup-protoc pins a modern protoc
      # matching what 'go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11'
      # expects. Drift on the 'protoc v X.Y.Z' header comment is filtered by
      # Makefile's proto-normalize so toolchain patch bumps don't break CI.
      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
      - name: install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
      - name: proto-check
        run: make proto-check

      # OpenAPI spec gate (PR #129). The spec is the source of truth for
      # documentation; the code is the source of truth for behavior; this
      # gate is the bridge. Same regenerate-and-diff pattern as proto-check /
      # sqlc-check / egress-check: vacuum lint + AST parity + git clean.
      # Fails the PR if a route / DTO / Code* constant drifts without a
      # matching spec change.
      #
      # vacuum is downloaded as a pre-built binary from GitHub Releases
      # (verified against VACUUM_SHA256_LINUX_AMD64) instead of `go install`'d
      # — the source build takes ~3 min cross-compiling vacuum against the
      # runner's Go toolchain. The binary is ~20 MB and downloads in <5 s.
      # The same precedent is used by every other binary in the EX44
      # ansible roles (deploy/ansible/roles/{alertmanager,node_exporter,
      # prometheus,firecracker,grafana}/), so the supply-chain pin pattern
      # matches the production host.
      - name: install vacuum
        run: |
          # Belt + suspenders: refuse to run on a non-x86_64 runner instead
          # of silently picking the wrong tarball. This matches the
          # `runs-on: ubuntu-latest` job contract.
          if [ "$(uname -m)" != "x86_64" ]; then
            echo "::error::vacuum install assumes x86_64; runner is $(uname -m)"
            exit 1
          fi

          # All interpolation happens in the shell — the env block above
          # only carries the version + SHA-256 pin, both of which MUST be
          # raw strings (no shell interpolation) so a future bump is a
          # single edit. `${VACUUM_VERSION}` in an env: value is NOT
          # expanded by GitHub Actions — we build the URL here.
          VACUUM_TARBALL="vacuum_${VACUUM_VERSION}_linux_x86_64.tar.gz"
          VACUUM_URL="https://github.com/daveshanley/vacuum/releases/download/v${VACUUM_VERSION}/${VACUUM_TARBALL}"
          mkdir -p "$HOME/.local/vacuum/bin"
          TAR="$RUNNER_TEMP/${VACUUM_TARBALL}"
          echo "→ downloading $VACUUM_URL"
          curl --fail --silent --show-error --location --output "$TAR" "$VACUUM_URL"
          echo "→ verifying SHA-256"
          echo "${VACUUM_SHA256_LINUX_AMD64}  $TAR" | sha256sum --check --strict
          echo "→ extracting"
          # The tarball is flat (LICENSE, README.md, vacuum) — no version
          # directory — so we extract into a temp scratch and copy the
          # binary to the stable install path.
          tar --extract --gzip --file "$TAR" --directory "$RUNNER_TEMP"
          cp "$RUNNER_TEMP/vacuum" "$HOME/.local/vacuum/bin/vacuum"
          chmod +x "$HOME/.local/vacuum/bin/vacuum"
          echo "→ installed: $("$HOME/.local/vacuum/bin/vacuum" version)"
          echo "$HOME/.local/vacuum/bin" >> "$GITHUB_PATH"
      - name: spec-check
        # The install vacuum step above appends $HOME/.local/vacuum/bin
        # to $GITHUB_PATH, so `make spec-install` finds the binary via
        # `command -v vacuum` (PATH lookup) and short-circuits before
        # the `go install` fallback. No GOBIN override needed: the
        # Makefile's `$(GOBIN)` default (`go env GOPATH/bin`) is the
        # correct install location for the local-dev `go install` path.
        run: make spec-check

      # M5+: pgx-backed Store. Tests that need Postgres are skipped when
      # DATABASE_URL is unset, so the suite stays green on local dev too.
      - name: pg integration tests
        env:
          DATABASE_URL: postgres://faas:faas@localhost:5432/faas?sslmode=disable
        run: go test -race -count=1 ./pkg/state/... ./pkg/db/...

  coverage:
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: faas
          POSTGRES_PASSWORD: faas
          POSTGRES_DB: faas
        ports:
          - 5432:5432
        # Health-check via pg_isready is supported on the official postgres
        # image; CI waits until the port is actually serving before the job
        # starts. Saves the "connection refused" flake on cold-startup.
        options: >-
          --health-cmd "pg_isready -U faas -d faas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://faas:faas@localhost:5432/faas?sslmode=disable
    # Decoupled from `test` so a coverage upload doesn't lengthen the
    # developer-feedback loop. Always runs on push-to-main + PR (no
    # `if:` filter) but `continue-on-error` on the upload step — the gate
    # project >= 70% is enforced at Codecov via codecov.yml status checks.
    name: coverage (Codecov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: coverage profile
        run: |
          mkdir -p coverage
          # -covermode=atomic is required for accurate concurrency coverage;
          # standard idiom for any package exercising goroutines.
          go test -race -count=1 -coverprofile=coverage/cover.out -covermode=atomic ./...

      - name: upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage/cover.out
          flags: unittests
          # Tokenless public repo upload is supported; the token in
          # secrets.CODECOV_TOKEN lifts the rate limit / adds PR comments.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  load:
    # M4 acceptance gate (spec §14 row 2): "1,000 rps to hot app adds < 2 ms p50".
    # Decoupled from the `test` job because (a) it is a load test, not a
    # coverage gate — coverage instrumentation skews latency and is
    # intentionally excluded; (b) it runs long (2 × 5 s + warmup) and
    # would lengthen the developer feedback loop if folded into `test`.
    #
    # Runner choice: `ubuntu-latest` (2 vCPU / 7 GB GitHub-hosted). The
    # test's gate is the DELTA between hot-load p50 and idle p50, not
    # absolute latency — per-process noise (Go runtime, GC, scheduler
    # jitter, CPU frequency scaling) cancels out. A 14-core local M-series
    # machine measures delta < 0 at 1k rps; the 2 vCPU on CI has plenty of
    # headroom for the same 5 s × 1k rps window. An earlier draft used
    # `ubuntu-4-cpus` (GitHub-hosted larger runner), but those need
    # org-level enablement (Settings → Actions → Runners → Larger runners)
    # and otherwise queue forever — our org doesn't have them provisioned,
    # so the job sat QUEUED for ~19 h without starting.
    name: load (1k rps hot-path)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      - name: make test-load
        run: make test-load

  metal:
    # Manual trigger from the Actions tab. Marked workflow_dispatch so the
    # job can be invoked on-demand once a self-hosted runner is registered
    # (the spec gates the EX44 acceptance tests on KVM + root). The
    # `runs-on: [self-hosted, kvm]` label combo fails fast on stock runners.
    name: metal (KVM + root, manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, kvm]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: metal tests
        run: sudo make test-metal
      - name: leak check
        run: sudo make leakcheck

  migrations:
    # PR #93 follow-up: deploy run 29841378918 failed at the migrate step
    # with "goose: error: found 1 missing migrations before current version
    # 21: version 14". The static check (make migrations-check) catches the
    # same failure mode from filenames alone in microseconds; the apply-and-
    # walk test exercises pkg/db.MigrateUp end-to-end against a fresh
    # schema, so SQL that parses but fails to apply is also caught here.
    # Decoupled from `test` so a regression surfaces immediately with the
    # exact missing-slot name rather than being buried in the unit-test
    # sweep.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: faas
          POSTGRES_PASSWORD: faas
          POSTGRES_DB: faas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U faas -d faas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://faas:faas@localhost:5432/faas?sslmode=disable
    name: migrations (contiguity + apply)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      - name: migrations check (static)
        run: make migrations-check
      # No `-tags no_pg` here on purpose: apply_walk_test.go carries
      # `//go:build !no_pg`, so the static-only `make migrations-check`
      # step skips it and this step picks it up. The `-run` filter
      # narrows to the single apply test; the five static tests live
      # in embed_test.go and are not built under `!no_pg` exclusion
      # here because their package has no build tag.
      - name: migrations apply-and-walk
        run: go test -race -count=1 -v -run TestMigrationsApplyAndWalk ./migrations/...

  e2e:
    # cmd/e2e harness — boots real daemons (apid + schedd + meterd) as
    # subprocesses and drives them through the production wire (HTTP/
    # gRPC/pg_notify). PR #135 wired the `make e2e` target into the
    # Makefile; this job runs it on PR + push-to-main. Decoupled from
    # `test` because cmd/e2e takes ~5-10 min (cold boot subprocesses)
    # and would lengthen the developer feedback loop. Metal subset
    # stays on `make test-metal` + `make metal-lima` — see the `metal`
    # job above. `pg_isready` is `psql` package-supplied; install it
    # explicitly because the Makefile preflight `command -v psql`
    # would otherwise fail.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: faas
          POSTGRES_PASSWORD: faas
          POSTGRES_DB: faas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U faas -d faas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://faas:faas@localhost:5432/faas?sslmode=disable
      # cmd/e2e respects these; absent env defaults are fine but
      # setting them explicitly keeps the wiring self-documenting.
      FAAS_SKIP_PG_TESTS: ""
    name: e2e (cmd/e2e, no metal)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      # `make e2e` requires `psql` on PATH (preflight guard). Ubuntu
      # runners don't ship postgresql-client by default — install it.
      # apt-get needs sudo on GitHub-hosted runners (unprivileged user
      # by default; see https://docs.github.com/actions/hosting-your-runners).
      - name: install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: make e2e
        run: make e2e
