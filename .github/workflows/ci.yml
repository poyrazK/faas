name: ci

# One-PR CI bundle (Tier 1+2 from the CI improvement plan):
#   - go-version pinned via go.mod
#   - go mod + build cache (setup-go@v5)
#   - concurrency cancel-in-progress (PR head ref)
#   - golangci-lint (catches errcheck, staticcheck, ineffassign beyond go vet)
#   - govulncheck (Go vulnerability DB scan)
#   - Codecov coverage (project gate >= 70%; informational patch)
#   - workflow_dispatch on the metal job (manual trigger from Actions tab)
#   - status badge in README, PR template for milestone gating
#
# Dependabot (.github/dependabot.yml) and CodeQL (.github/workflows/codeql.yml)
# live as separate files alongside this one.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs when a PR ref updates (push to the same branch)
# or main receives a new commit. Saves CI minutes and removes the
# "did my fix actually run?" confusion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Codecov + CodeQL need write to attach comments / SARIF uploads.
  # Each restricted here so the default-`read` token isn't open.
  pull-requests: write
  security-events: write

env:
  GO_VERSION: "1.25"

jobs:
  # Default fast lane: lint + vet + unit + build + proto.
  # All gates that block PR merge live here.
  test:
    name: lint + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: faas
          POSTGRES_PASSWORD: faas
          POSTGRES_DB: faas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U faas -d faas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://faas:faas@localhost:5432/faas?sslmode=disable
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          # cache: true + cache-dependency-path is the canonical Go Actions
          # warm-cache idiom — shaves ~60s off every job on a non-first run.
          cache: true
          cache-dependency-path: go.sum

      # golangci-lint replaces bare gofmt + go vet with a curated set of
      # checks. v2.4.0+ is built with Go 1.25 and supports a go.mod
      # targeting Go 1.25 (golangci-lint v1.x is built with Go 1.23 and
      # refuses go.mod 'go 1.25.0' — see golangci/golangci-lint#5873).
      # action v8 requires golangci-lint >= v2.1.0; v9 is current.
      - name: lint (golangci-lint v8)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4.0
          args: --timeout=3m
          # Cache is built into the action; default cache key works.

      # govulncheck — Go's official vulnerability scanner. Runs against
      # go.mod's module graph, reports known CVEs in transitive deps.
      # Public surface = public attack surface; this gate is cheap.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # Re-runs the same checks golangci-lint covers as a fallback, in case
      # the lint step is skipped (e.g. workflow_dispatch with no Go file
      # changes). Keeps the existing local Makefile contract honest.
      - name: gofmt
        run: test -z "$(gofmt -l $(find . -name '*.go'))" || (gofmt -l $(find . -name '*.go'); exit 1)
      - name: vet
        run: go vet ./...
      - name: unit tests
        run: make test
      - name: build
        run: make build

      # Daemon smoke: every cmd/<daemon>/main.go is a one-box binary that wires
      # through pkg/wire.Daemon. `--help` must exit 0 with non-empty usage text
      # (a silent success here usually means init() truncated on a bad flag
      # spec). Catches nil-deref and broken flag wiring that `make build` alone
      # won't, in ~1 s. Mirrors the PR template checklist line `make build`.
      - name: daemon smoke (--help)
        run: |
          set -e
          for d in apid builderd faas gatewayd imaged meterd schedd vmmd; do
            out=$(./bin/$d --help 2>&1)
            if [ -z "$out" ]; then
              echo "::error::$d --help returned no output"
              exit 1
            fi
            printf '%-9s %4d bytes\n' "$d" "${#out}"
          done

      # M1+ (ADR-013): *.pb.go is checked in; this step verifies it's in sync
      # with the .proto sources. arduino/setup-protoc pins a modern protoc
      # matching what 'go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11'
      # expects. Drift on the 'protoc v X.Y.Z' header comment is filtered by
      # Makefile's proto-normalize so toolchain patch bumps don't break CI.
      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
      - name: install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
      - name: proto-check
        run: make proto-check

      # M5+: pgx-backed Store. Tests that need Postgres are skipped when
      # DATABASE_URL is unset, so the suite stays green on local dev too.
      - name: pg integration tests
        env:
          DATABASE_URL: postgres://faas:faas@localhost:5432/faas?sslmode=disable
        run: go test -race -count=1 ./pkg/state/... ./pkg/db/...

  coverage:
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: faas
          POSTGRES_PASSWORD: faas
          POSTGRES_DB: faas
        ports:
          - 5432:5432
        # Health-check via pg_isready is supported on the official postgres
        # image; CI waits until the port is actually serving before the job
        # starts. Saves the "connection refused" flake on cold-startup.
        options: >-
          --health-cmd "pg_isready -U faas -d faas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://faas:faas@localhost:5432/faas?sslmode=disable
    # Decoupled from `test` so a coverage upload doesn't lengthen the
    # developer-feedback loop. Always runs on push-to-main + PR (no
    # `if:` filter) but `continue-on-error` on the upload step — the gate
    # project >= 70% is enforced at Codecov via codecov.yml status checks.
    name: coverage (Codecov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: coverage profile
        run: |
          mkdir -p coverage
          # -covermode=atomic is required for accurate concurrency coverage;
          # standard idiom for any package exercising goroutines.
          go test -race -count=1 -coverprofile=coverage/cover.out -covermode=atomic ./...

      - name: upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage/cover.out
          flags: unittests
          # Tokenless public repo upload is supported; the token in
          # secrets.CODECOV_TOKEN lifts the rate limit / adds PR comments.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  metal:
    # Manual trigger from the Actions tab. Marked workflow_dispatch so the
    # job can be invoked on-demand once a self-hosted runner is registered
    # (the spec gates the EX44 acceptance tests on KVM + root). The
    # `runs-on: [self-hosted, kvm]` label combo fails fast on stock runners.
    name: metal (KVM + root, manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, kvm]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: metal tests
        run: sudo make test-metal
      - name: leak check
        run: sudo make leakcheck
