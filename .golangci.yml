# golangci-lint config — schema v2.
# Defaults + a small set of checks that catch real defects in this
# codebase (errcheck fired for us before; staticcheck catches shadowing,
# type-mismatch flags, etc.).
#
# Schema v2 — required by golangci-lint >= v2.0. Action v8 pins v2.4.0
# which is built with Go 1.25 and supports our go.mod's 'go 1.25.0'
# directive (v1.x was built with Go 1.23 and rejected the bump — see
# golangci/golangci-lint#5873).
version: "2"

# Disable default linters — explicit allow-list below.
linters:
  default: none
  enable:
    - errcheck       # unchecked errors — caught the Body.Close() bug
    - govet          # default, but explicit for visibility
    - ineffassign    # = instead of :=
    - staticcheck    # shadowing, unused receivers, type-mismatch, gosimple
    - unused         # unused params/vars/funcs
    - goconst        # repeated literals to const
    - misspell       # typo'd identifiers
    - nilerr         # `return nil` after assigning to err
    - errorlint      # fmt.Errorf must wrap with %w; ==/!= against errors → errors.Is
    - bodyclose      # unclosed *http.Response.Body on every request path
    - contextcheck   # ctx captured in goroutines, stored in structs, or detached without justification

  # Per-path exclusions for noisy linters on tests, plus the
  # generated-protobuf and metal-test files. The v2 schema puts
  # `skip-dirs` / `skip-files` here as `linters.exclusions.paths` and
  # the v1 `issues.exclude-rules` as `linters.exclusions.rules`.
  exclusions:
    paths:
      - pkg/fcvm/leakcheck/metal  # build-tagged metal tests; runner lacks KVM
      - ".*\\.pb\\.go$"          # generated protobufs
      - ".*_grpc\\.pb\\.go$"     # generated gRPC stubs
    rules:
      - path: "_test\\.go$"
        linters:
          - errcheck  # `defer x.Close()` is acceptable idiom in tests
          - goconst   # repeated test-fixture literals are fine; promoting
                      # them to package consts adds noise without value
      - path: "pkg/wire/metrics_test.go"
        linters:
          - errcheck
