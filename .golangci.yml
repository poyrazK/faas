# golangci-lint config — version-pinned to v1.61.0 in CI.
# Defaults + the small set of checks that catch real defects in this
# codebase (errcheck fired for us before; staticcheck catches shadowing,
# type-mismatch flags, etc.).
#
# Schema version 1 — v1.61.0 reads this as-is. golangci-lint v2 (>=v2.0)
# auto-promotes to schema v2 on first run if it sees the schema missing,
# but `version: "1"` here ensures v1 behaviour either way.
version: "1"

# Disable gofmt because we already have a separate gofmt step in CI;
# golangci-lint would re-run it with overlapping failures.
# Disable gocritic/gocyclo/revive — too noisy for the current phase.

run:
  timeout: 3m
  tests: true
  # Only the real source dirs — vendoring, generated files excluded.
  skip-dirs:
    - pkg/fcvm/leakcheck/metal
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*_grpc\\.pb\\.go$"

linters:
  disable-all: true
  enable:
    - errcheck       # unchecked errors — caught the Body.Close() bug
    - govet          # default, but explicit for visibility
    - ineffassign    # = instead of :=
    - staticcheck    # shadowing, unused receivers, type-mismatch
    - unused         # unused params/vars/funcs
    - gosimple       # syntactic landmines
    - goconst        # repeated literals to const
    - misspell       # typo'd identifiers
    - nilerr         # `return nil` after assigning to err

issues:
  # Same exclusions as the linters.run.skip-files.
  exclude-rules:
    - path: "_test\\.go$"
      linters:
        - errcheck  # `defer x.Close()` is acceptable idiom in tests
        - gosimple
    - path: "pkg/wire/metrics_test.go"
      linters:
        - errcheck
  # Default for non-test: keep max 50 issues per linter.
  max-issues-per-linter: 0
  max-same-issues: 0
