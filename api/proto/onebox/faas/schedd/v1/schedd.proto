// schedd — the scheduler and instance-lifecycle owner (spec §4.3, ADR-018).
// schedd is the ONLY writer to the `instances` table and the sole owner of the
// state machine (spec §6). This gRPC surface is how gatewayd asks schedd to
// wake an app and reports request activity back; schedd itself dials vmmd
// (api/proto/onebox/faas/vmmd/v1) to drive the actual microVM lifecycle.
//
// Wire discipline mirrors vmmd (ADR-013): checked-in *.pb.go generated with
// paths=source_relative, errors enveloped through pkg/grpcerr, auth is the
// unix-socket DAC model (mode 0660 group `faas`, ADR-015) on
// /run/faas/schedd.sock.

syntax = "proto3";

package onebox.faas.schedd.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/onebox-faas/faas/api/proto/onebox/faas/schedd/v1;scheddpb";

// Schedd is the gRPC service schedd exposes on its unix socket. Two RPCs for
// v1.0 — gatewayd is the only caller. Multi-host (Gate-A) replaces the socket
// with mTLS; this ADR-018 surface is per-host.
service Schedd {
  // Wake ensures an instance for the app is running and returns the address
  // the gateway should proxy to. Blocks for the duration of admission +
  // (restore | cold boot) + readiness. Idempotent: a request for an app that
  // already has a running instance returns that instance's address without a
  // new boot. Admission denial (RAM ceiling / plan concurrency / vCPU slots)
  // returns a ResourceExhausted status carrying the RFC 7807 problem so the
  // gateway can serve a 503 (spec §4.3).
  rpc Wake(WakeRequest) returns (WakeResponse);

  // ReportActivity records per-instance last_request_at touches the gateway
  // batches (spec §4.1 flushes every 15 s). schedd persists them because
  // schedd is the ONLY writer to the `instances` table (CLAUDE.md ownership);
  // the gateway keeps the batch in memory between flushes (ADR-018).
  rpc ReportActivity(ReportActivityRequest) returns (ReportActivityResponse);

  // ParkInstance forces an instance to its parked state. Added in M7 so
  // meterd's Free-tier hard-stop can park every live instance on a
  // suspended account (spec §4.7). Reason is for audit logs ("quota_
  // exceeded_free" etc). Returns Ok on success; ResourceExhausted / NotFound
  // for the obvious error paths.
  rpc ParkInstance(ParkInstanceRequest) returns (ParkInstanceResponse);
}

message WakeRequest {
  // app_id is the apps.id UUID (the gateway resolves host→app before calling).
  string app_id = 1;
}

// WakeMethod reports whether the wake was a snapshot restore or a cold boot.
// Wire-stable: do NOT reorder; new slots go at the end. Mirrors vmmd's enum so
// the two services agree on the value set.
enum WakeMethod {
  WAKE_COLD_BOOT = 0;
  WAKE_RESTORE   = 1;
}

message WakeResponse {
  // instance_id is the instances.id row schedd created (or reused).
  string instance_id = 1;
  // node_id is the compute_node.id (uuid) the instance lives on
  // (issue #98 / ADR-028). The gateway looks up the node's per-node
  // gRPC client via its routing cache and forwards the request via the
  // vmmd ForwardHTTP RPC. Empty only on the error path.
  //
  // Renamed from the legacy `addr` field (PR #116-era was host_ip:8080,
  // an inner-netns placeholder unreachable from gatewayd on a remote
  // host). Dual semantics were deliberately not preserved — leaving
  // both fields risks a caller picking the wrong one and regressing
  // the hot path silently. The new shape is the only contract.
  string node_id     = 2;
  // method reports what actually happened (a restore that fell back to cold
  // boot per ADR-005 reads WAKE_COLD_BOOT).
  WakeMethod method  = 3;
  // problem carries the RFC 7807 fields on failure. The status code itself is
  // google.rpc.Status via google.golang.org/grpc/status; see pkg/grpcerr. This
  // field mirrors vmmd's WakeResponse and stays unset on success.
  google.protobuf.Struct problem = 4;
}

// Touch is one instance's most-recent request time.
message Touch {
  string instance_id = 1;
  // unix_ms is the request time in Unix milliseconds.
  int64  unix_ms     = 2;
}

message ReportActivityRequest {
  repeated Touch touches = 1;
}

message ReportActivityResponse {
  // applied is the number of touches schedd persisted (rows that matched a
  // known instance). Lets the gateway detect a mass mismatch in tests/metrics.
  int32 applied = 1;
}

// ParkInstanceRequest asks schedd to park one instance. The reason
// string flows through to the audit log + park-reason metric.
message ParkInstanceRequest {
  string instance_id = 1;
  string reason      = 2;
}

message ParkInstanceResponse {
  // ok reports whether the park succeeded. False means the instance
  // was already parked (idempotent) or didn't exist.
  bool ok = 1;
}
