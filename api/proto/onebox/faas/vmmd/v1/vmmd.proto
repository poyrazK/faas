// vmmd — the only root component, owns firecracker+jailer (spec §4.4, ADR-013,
// ADR-014, ADR-016). All five RPCs map 1:1 to spec §4.4 line 138. Wire shape
// stays narrow: the caller resolves `(app)` into AppSpec; vmmd never queries
// apid or postgres on its own.

syntax = "proto3";

package onebox.faas.vmmd.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/onebox-faas/faas/api/proto/onebox/faas/vmmd/v1;vmmdpb";

// Vmmd is the gRPC service vmmd exposes on its unix socket. The Unix-socket
// auth model (mode 0660 group `faas`, ADR-015) is the only authentication
// story for v1.0 — Gate-A multi-host replaces it with mTLS.
service Vmmd {
  // CreateFromSnapshot wakes an instance by restoring a previously-parked
  // snapshot. Falls back to cold boot if the snapshot is stale, missing, or
  // fails to load (ADR-005: cold boot always works).
  rpc CreateFromSnapshot(CreateFromSnapshotRequest) returns (WakeResponse);

  // CreateColdBoot primes an instance with no snapshot — the deploy-pipeline
  // first-boot path (M2). Equivalent to Wake with Snapshot == nil.
  rpc CreateColdBoot(CreateColdBootRequest) returns (WakeResponse);

  // PauseAndSnapshot pauses the VM and writes a full snapshot to the
  // requested host-side paths, then destroys the live VM. After return the
  // instance is gone (§6.1: PARKED is zero-RAM).
  rpc PauseAndSnapshot(PauseAndSnapshotRequest) returns (SnapshotResponse);

  // Destroy tears down a running instance. Idempotent on unknown instances.
  rpc Destroy(DestroyRequest) returns (DestroyResponse);

  // Stats returns current liveness + allocator views. Used by schedd's
  // admission ledger (M4) and by Prometheus for the `vmmd_ops_total` /
  // `vmmd_op_duration_seconds` dashboards (ADR-016).
  rpc Stats(StatsRequest) returns (StatsResponse);

// Ping is a wire-only liveness probe (issue #97 / ADR-025 axis 3,
  // PR #114). Returns the vmmd process's Firecracker version + the
  // server-side timestamp at the moment the handler ran; schedd's
  // heartbeat loop calls this on every active compute_node every
  // HeartbeatInterval (default 30s). A successful round-trip proves
  // both that the gRPC socket is reachable and that vmmd's
  // goroutine scheduler is responsive enough to schedule this
  // handler — the two facts schedd needs to keep last_heartbeat_at
  // fresh. Idempotent + side-effect free; no backing Manager call.
  rpc Ping(PingRequest) returns (PingResponse);

  // ForwardHTTP bridges one HTTP request from gatewayd into a live
  // instance's netns. Issue #98 / ADR-028: the gatewayd hot path speaks
  // HTTP to vmmd over the Tailscale/Wireguard overlay (no second
  // transport), and vmmd nsenter's the per-instance netns and dials
  // netns.GuestIP:netns.AppPort. Body is capped at 25 MiB; response
  // headers carry a 60s deadline; errors map to Unavailable so the
  // gateway retries the wake on the next hop. The handler is
  // additive — single-node deployments never call it.
  rpc ForwardHTTP(ForwardHTTPRequest) returns (ForwardHTTPResponse);

  // Heartbeat lets schedd ping vmmd over the overlay. The reverse
  // direction (vmmd-pushes) was rejected because schedd is the
  // admission authority and shouldn't trust inbound traffic from a
  // box it may have already drained. Empty request, empty response:
  // success is "did it return Unavailable" and the timestamp comes
  // from the caller. See pkg/overlay.DialContext and schedd's
  // heartbeat goroutine (issue #98).
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

// AppSpec flattens what the caller knows about an app. vmmd stores none of
// it; the proto exists so each request is self-describing and vmmd stays
// stateless about app config (ADR-014).
message AppSpec {
  // Issue #96 / ADR-025 axis 2 (PR #116): drive0 base + drive1 layer
  // are referenced by StorageBackend keys, not host paths. The wire
  // carries canonical keys (e.g. "base/runtime-node22.ext4",
  // "apps/<slug>/<depID>.ext4"); vmmd resolves them locally via
  // Storage.Get before staging into the jail chroot. The local
  // StorageBackend's Get maps keys to /srv/fc/.../...ext4 the same
  // way the legacy *_path fields did, so single-box behaviour is
  // preserved. The OCI backend resolves keys over HTTP, which is what
  // unblocks multi-node cold-boot on a vmmd that doesn't share
  // /srv/fc with schedd (issue #98).
  string base_key   = 1;
  string layer_key  = 2;
  // 2 for free/hobby/pro; 4 for Scale.
  int32  vcpu_count  = 3;
  // plan RAM in MiB (the slice fences at +8 per spec §1).
  int32  mem_size_mib = 4;
  // per-plan egress bandwidth cap in Mbit/s (spec §7). 0 = no cap
  // (legacy callers / disabled path); vmmd applies a tbf qdisc on the
  // host-side veth to enforce Free/Hobby/Pro/Scale (10/25/100/250).
  int32  egress_mbit  = 5;
  // Per-key sealed env rows the caller wants loaded into the guest's
  // env (spec §11/G2). Each entry was sealed independently by apid
  // against the host X25519 recipient; vmmd unseals each, merges into
  // a single envelope, and writes /etc/faas/secrets.env on drive1.
  // Empty list = no file written.
  repeated SealedSecret sealed_env = 6;
}

// SealedSecret is one (key, ciphertext) pair from app_secrets. The key is
// the env-var name; the ciphertext is sealed by apid via filippo.io/age
// under the host X25519 recipient. vmmd merges all entries into the
// single envelope file written to drive1.
message SealedSecret {
  string key        = 1;
  bytes  ciphertext = 2;
}

// SnapshotRef points at the snapshot a caller wants to restore from. The
// bytes live under the canonical StorageBackend key (issue #96, ADR-025
// axis 2); vmmd allocates its own staging tmp via Storage.Get before
// firing the firecracker restore. fc_version + storage_key together pin
// the artifact and the Firecracker binary that produced it (ADR-005).
message SnapshotRef {
  string deployment_id = 1;
  reserved 2; // formerly mem_path — torn out after #96 slice 3.
  string vmstate_path  = 3;
  // The Firecracker version the snapshot was made with (ADR-005: pinned).
  // If empty, the daemon uses the running fcVersion (current behaviour).
  string fc_version    = 4;
  // storage_key is the canonical StorageBackend key under which the mem
  // blob lives. The daemon resolves the bytes through the configured
  // StorageBackend and stages them into an os.TempDir() location for
  // the FC restore source.
  string storage_key   = 5;
}

// WakeResponse is the common return shape of CreateFromSnapshot and
// CreateColdBoot. The caller receives the lease + netns identity but does
// NOT receive the inner guest networking — that's identical across instances
// (ADR-009) and stays implicit.
message WakeResponse {
  // The instance name as it appears in the `instances` table; echoes the
  // request's `instance` field for request logging.
  string instance              = 1;
  int32  lease_uid             = 2;   // 20000-29999
  // NetIP string representation; serialise/parse via netip.Addr.String().
  string host_ip               = 3;
  string netns                 = 4;   // fc-<instance>
  string veth_host             = 5;
  string veth_peer             = 6;
  WakeMethod method            = 7;
  // The PlanWake decision — what the *caller* expected. Method reports what
  // actually happened (e.g. a restore that fell back reads WAKE_COLD_BOOT).
  WakeMethod requested_method  = 8;
  // RFC 7807 fields, populated only on failure. The status code itself is
  // google.rpc.Status via google.golang.org/grpc/status; see pkg/grpcerr.
  google.protobuf.Struct problem = 9;
}

// WakeMethod is whether a wake was a snapshot restore or a cold boot.
// Wire-stable: do NOT reorder. New enum slots go at the end.
enum WakeMethod {
  WAKE_COLD_BOOT = 0;
  WAKE_RESTORE   = 1;
}

message CreateFromSnapshotRequest {
  string instance = 1;
  AppSpec app      = 2;
  SnapshotRef snapshot = 3;
}

message CreateColdBootRequest {
  string instance = 1;
  AppSpec app      = 2;
  // Build carries the builder-VM specifics. Nil for app VMs (the common case).
  // vmmd branches on presence: with Build set, the chroot is registered for
  // drive1 export during Destroy and the build manifest is left untouched on
  // drive1 (builderd's CreateBuildDrive1 wrote it). Spec §4.5, ADR-003.
  BuildSpec build = 3;
}

// BuildSpec identifies an instance as a builder VM. vmmd's Destroy waits for
// the firecracker child to exit, captures its exit code, and copies
// /etc/faas/build-done.json + /build/out/* out of the chroot into ExportDir
// before removing the chroot. Builderd writes BuildManifest (BuildManifestPath)
// onto drive1 at CreateColdBoot time so guest-init can read it once the VM is up.
message BuildSpec {
  // Host directory vmmd populates during Destroy with:
  //   <export_dir>/build-done.json
  //   <export_dir>/build/out/image.tar  (and any siblings)
  // Required for builder VMs; ignored otherwise. vmmd refuses export > MaxExportedLayerBytes.
  string export_dir = 1;
}

message PauseAndSnapshotRequest {
  string instance    = 1;
  reserved 2; // formerly mem_path — torn out after #96 slice 3.
  string vmstate_path = 3;
  // storage_key (issue #96, ADR-025 axis 2) is the canonical StorageBackend
  // key the mem blob is published under after the snapshot. The daemon
  // stores via the configured StorageBackend; vmmstate_path is the
  // resolved-on-host location vmmd hands the firecracker socket to
  // while pausing, then publishes under its own StorageBackend key.
  string storage_key = 4;
}

message SnapshotResponse {
  int64 mem_bytes     = 1;
  int64 vmstate_bytes = 2;
}

message DestroyRequest {
  string instance = 1;
}

message DestroyResponse {
  // Echoed for callers that batch destroys and want a confirmation record.
  // Successful destroys produce an empty `problem` field.
  string instance = 1;
  // Populated for builder VMs from the firecracker child's exit status (the
  // build's own exit code; 137 = OOM, 124 = timeout, etc — see
  // pkg/builderd/builderd.go failure-class table). 0 for app VMs.
  int32  exit_code = 2;
}

message StatsRequest {}

message StatsResponse {
  int32  live_count = 1;
  int32  leased_count = 2;
  // Optional so unset != 0 (Int64Value = 0 vs absent differs in prom metrics).
  google.protobuf.Int64Value total_resident_bytes = 3;
  repeated InstanceStats instances = 4;
}

message InstanceStats {
  string instance = 1;
  int32  lease_uid = 2;
  string host_ip   = 3;
  google.protobuf.Int64Value resident_bytes = 4;
}

// PingRequest is intentionally empty. Ping is a liveness probe; the
// request body carries nothing beyond what the gRPC method itself
// implies. Reserved for future use (operator-supplied challenge
// nonce, etc.) without bumping the wire version.
message PingRequest {}

// PingResponse carries the Firecracker version + server-side
// timestamp. fc_version lets schedd's admin surface show "this node
// runs FC 1.10.x" without a separate Stats call; server_time is
// informational (the heartbeat loop stamps last_heartbeat_at
// against its own clock, not this field).
message PingResponse {
  string fc_version = 1;
  google.protobuf.Timestamp server_time = 2;
}

// ForwardHTTPRequest is gatewayd→vmmd for one HTTP request. The wire
// shape mirrors a request line + headers + body. Headers are
// repeated for natural grpc compatibility (headers can repeat in
// HTTP/1.1). The body is bounded by ForwardMaxBodyBytes (25 MiB) —
// gatewayd refuses upstream bodies larger than that before sending.
message ForwardHTTPRequest {
  // The compute_node-relative instance id (instances.id, scoped to a
  // node). vmmd resolves the netns from this.
  string instance     = 1;
  // HTTP method: GET, POST, HEAD, PUT, DELETE, OPTIONS, PATCH.
  string method       = 2;
  // Request-target — path?query, e.g. "/api/v1/items?id=42".
  string request_uri  = 3;
  // Headers, in order. Each entry is one header line. Multi-valued
  // headers are repeated (HTTP/1.1 allows). Gatewayd MUST drop
  // hop-by-hop headers (Connection, Transfer-Encoding, etc.) before
  // sending — see pkg/gateway/forwardproxy.go's stripHopByHop.
  repeated Header headers = 4;
  // Request body. Capped at ForwardMaxBodyBytes. vmmd treats an empty
  // body as zero-length, not missing.
  bytes  body         = 5;
}

// Header is one (name, value) HTTP header line. Both fields are
// bytes-rather-than-string so non-ASCII values survive the round
// trip without proto-text round-trip surprises.
message Header {
  string name  = 1;
  string value = 2;
}

// ForwardHTTPResponse is what vmmd returns. Status carries the
// numeric HTTP status code; headers are the upstream response
// headers; body is the response body (also capped). On a vmmd-side
// failure (cannot reach guest, guest 500, nsenter EIO) the handler
// returns a gRPC status instead — the proto envelope here is the
// success path only.
message ForwardHTTPResponse {
  int32 status   = 1;
  repeated Header headers = 2;
  bytes body     = 3;
}

// ForwardMaxBodyBytes is the per-request body cap (25 MiB). It matches
// the gatewayd upstream cap (spec §13 / pkg/api.Limits.HTTPRequestMax).
// proto3 has no top-level constants, so this is documented inline;
// the constant lives in Go at vmmdgrpc.ForwardMaxBodyBytes.

// HeartbeatRequest and HeartbeatResponse are intentionally empty:
// the heartbeat is a presence-only ping. Schedd measures the round
// trip itself; vmmd reports nothing. We keep the envelopes
// (vs. reusing google.protobuf.Empty) so future fields — e.g. a
// "what's your RAM headroom right now" piggyback — can be added
// without a wire version bump on a hot path.
message HeartbeatRequest {}

message HeartbeatResponse {}
