# one-box FaaS network baseline (spec §7, tier-1 of the network roadmap).
#
# Bridged-tenant egress REQUIRES root-ns IPv4 forwarding: the per-instance
# netns's `oifname <VethPeer> masquerade` translates the guest source from
# 10.0.0.2 → 10.100.x.y, but the kernel must actually forward the packet
# out eth0 for the host's `table inet faas postrouting` chain to MASQUERADE
# it to the public IP. Without net.ipv4.ip_forward=1, the kernel drops every
# bridged-tenant packet at routing with EHOSTUNREACH before the nft chain
# even sees it.
#
# File is named to load BEFORE the existing security baseline
# `99-faas.conf` (deployed by the grub role) so the precedence ordering is
# readable: low number = loads first on sysctl --system, but every file
# sets the same key to the same value here so order doesn't matter for
# this specific key.
net.ipv4.ip_forward = 1
