# nftables (spec §7, §11).
#
# Tenant egress policy per spec §7/§11:
#   - default drop forward
#   - deny SMTP (25/465/587) — functions don't email
#   - deny RFC1918, link-local (169.254/16), metadata — no internal
#     network or metadata exfiltration
#   - allow outbound to public IPs only
#
# The tap-side NAT is used in M2+ when gatewayd pulls guest traffic
# out to the public net; we deploy it now so the ruleset is converged
# before the first cold boot.
#
# Source of truth for the ruleset is `pkg/netns/policy.go`'s HostPolicy
# renderer. The checked-in artifact at `files/policy_nftables.conf` is
# regenerated by `make egress-render`; `make egress-check` (run by CI)
# fails if the artifact drifts from the live render. The bridge name
# (`br-tenants`) must match `pkg/netns.TenantBridge` — the unit test
# `TestTenantBridgeMatches` in `pkg/netns/config_test.go` enforces this.
#
# Idempotency: if /etc/nftables.conf differs from the artifact, the
# `creates:` flag on the .faas-orig sentinel prevents overwriting a
# non-faas config. The first time we drop it, we save the previous
# one as .faas-orig so `git diff /etc/nftables.conf` can show what
# changed during a re-run with a different ruleset.

- name: nftables — install nftables package
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: nftables — back up any pre-existing nftables.conf (one-time)
  ansible.builtin.copy:
    src: /etc/nftables.conf
    dest: /etc/nftables.conf.faas-orig
    remote_src: true
  failed_when: false
  when: "'onebox-faas' not in (lookup('file', '/etc/nftables.conf', errors='ignore') or '')"

# Tenant bridge bootstrap (idempotent). The per-instance netns in
# pkg/netns/config.go expects `br-tenants` to exist with IP 10.100.0.1/16
# — this is the gateway IP the per-instance default route installs. The
# Lima metal shim does this in deploy/lima/run-metal.sh; production
# EX44 bootstrap needs the equivalent. MUST run BEFORE the nft
# syntax-check / reload below — the host firewall's forward chain uses
# `iif "br-tenants"`, which resolves the interface index at load time
# and fails on a clean box if the bridge is missing. The `ip link add`
# task is gated by `creates:` so converged runs no-op; the `ip addr
# add` swallows only the "File exists" error and reports changed
# on a fresh box.
#
# NOTE: persistence across reboots is OUT OF SCOPE for this PR.
# The runtime `ip` commands recreate the bridge each boot; a
# follow-up should add a netplan / systemd-networkd / oneshot
# unit so the bridge survives restart on the EX44. Until then
# operators must `make bootstrap` again after every reboot.
- name: nftables — ensure tenant bridge exists
  ansible.builtin.command: ip link add {{ tenant_bridge }} type bridge
  args:
    creates: /sys/class/net/{{ tenant_bridge }}

- name: nftables — ensure bridge IP is present
  ansible.builtin.command: ip addr add {{ bridge_cidr }} dev {{ tenant_bridge }}
  register: bridge_addr
  changed_when: "'RTNETLINK answers: File exists' not in bridge_addr.stderr"
  failed_when:
    - bridge_addr.rc != 0
    - "'File exists' not in bridge_addr.stderr"

- name: nftables — bring the tenant bridge up
  ansible.builtin.command: ip link set {{ tenant_bridge }} up

- name: nftables — drop faas ruleset into /etc/nftables.conf
  ansible.builtin.copy:
    src: policy_nftables.conf
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
  register: nft_drop

- name: nftables — syntax-check the ruleset
  ansible.builtin.command: nft -c -f /etc/nftables.conf
  changed_when: false
  check_mode: false

# Apply the ruleset now — the role has no reload handler, so a re-run
# that changes /etc/nftables.conf would otherwise leave the live kernel
# running the old ruleset until next reboot. Gated on nft_drop.changed
# to stay no-op on a converged box. Idempotent: the ruleset's
# `flush ruleset` first directive wipes and re-loads.
- name: nftables — load the ruleset (no reload handler; reload directly)
  ansible.builtin.command: nft -f /etc/nftables.conf
  when: nft_drop.changed

- name: nftables — enable + start nftables
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started
  register: nft_svc
  failed_when: false  # in chroot/CI `nftables` may not have systemd; let the gate slide
