# nftables (spec §7).
#
# Tenant egress policy per spec §7:
#   - default drop forward
#   - deny SMTP (25/465/587) — functions don't email
#   - deny RFC1918, link-local (169.254/16), metadata — no internal
#     network or metadata exfiltration
#   - allow outbound to public IPs only
#
# The tap-side NAT is used in M2+ when gatewayd pulls guest traffic
# out to the public net; we deploy it now so the ruleset is converged
# before the first cold boot.
#
# Idempotency: if /etc/nftables.conf differs from the template, the
# `creates:` flag on the .faas-orig sentinel prevents overwriting a
# non-faas config. The first time we drop it, we save the previous
# one as .faas-orig so `git diff /etc/nftables.conf` can show what
# changed during a re-run with a different ruleset.

- name: nftables — install nftables package
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: nftables — back up any pre-existing nftables.conf (one-time)
  ansible.builtin.copy:
    src: /etc/nftables.conf
    dest: /etc/nftables.conf.faas-orig
    remote_src: true
  failed_when: false
  when: "'onebox-faas' not in (lookup('file', '/etc/nftables.conf', errors='ignore') or '')"

- name: nftables — drop faas ruleset into /etc/nftables.conf
  ansible.builtin.copy:
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      #!/usr/sbin/nft -f
      # onebox-faas nftables.conf (spec §7, §11)
      # Tenant egress denylist — SMTP, RFC1918, link-local, metadata.
      # Tap proxy NAT — used by gatewayd for outbound guest traffic (M2+).

      flush ruleset

      table inet faas {
        chain input {
          type filter hook input priority 0; policy drop;
          ct state established,related accept
          iif lo accept
          iifname "faas-tenant-bridge" accept
          tcp dport 22 accept     # sshd ops
          tcp dport 80 accept      # http-01 for CertMagic (Pro)
          tcp dport 443 accept
        }

        chain forward {
          type filter hook forward priority 0; policy drop;
          ct state established,related accept
          iif "faas-tenant-bridge" oifname "eth0" accept

          # spec §7 denylist
          tcp dport 25  drop
          tcp dport 465 drop
          tcp dport 587 drop
          ip daddr 10.0.0.0/8       drop     # RFC1918
          ip daddr 172.16.0.0/12    drop
          ip daddr 192.168.0.0/16   drop
          ip daddr 169.254.0.0/16   drop     # link-local + cloud metadata
          ip daddr 100.64.0.0/10    drop     # CGN
        }

        chain output {
          type filter hook output priority 0; policy accept;
        }
      }
  register: nft_drop

- name: nftables — syntax-check the ruleset
  ansible.builtin.command: nft -c -f /etc/nftables.conf
  changed_when: false
  check_mode: false

- name: nftables — enable + start nftables
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started
  register: nft_svc
  failed_when: false  # in chroot/CI `nftables` may not have systemd; let the gate slide
