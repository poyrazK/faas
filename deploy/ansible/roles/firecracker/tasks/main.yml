# firecracker (spec §4.4, §M0 acceptance).
#
# Pins `firecracker` + `jailer` to a specific GitHub release and
# fetches the matching `vmlinux-6.1.x` guest kernel. The SHA-256s
# come from `defaults/main.yml` so a future upgrade is a one-line
# change: bump `fc_version` and re-run `make bootstrap`.
#
# Pinned version rationale (spec §Conventions: "Never log secret
# values; env secrets are sealed at rest"): releasing a guest kernel
# with a broken virtio-rng path would silently break the resume hook's
# entropy re-seeding (V6), so we pin BOTH the binary version AND the
# kernel checksum.
#
# Why fc_version is a defaults entry: ansible-roles-defaults makes it
# overridable at invocation time (`ansible-playbook -e fc_version=1.8.0`)
# without touching the role — needed for canary boots during a
# version bump (see ADR-005: snapshots pin to fc_version; on FC
# upgrade snapshots go stale → apps re-snapshot via cold boot).

- name: firecracker — read role defaults for current pin
  ansible.builtin.debug:
    var: fc_release

- name: firecracker — mkdir /usr/local/bin and /srv/fc/base
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /usr/local/bin
    - /srv/fc/base

- name: firecracker — download firecracker release tarball
  ansible.builtin.get_url:
    url: "https://github.com/firecracker-microvm/firecracker/releases/download/{{ fc_release }}/firecracker-{{ fc_release }}-{{ fc_arch }}.tgz"
    dest: "/tmp/firecracker-{{ fc_release }}.tgz"
    checksum: "sha256:{{ fc_release_sha256 }}"
    owner: root
    group: root
    mode: "0644"
  register: fc_tarball

- name: firecracker — verify tarball SHA-256
  ansible.builtin.command: sha256sum /tmp/firecracker-{{ fc_release }}.tgz
  register: tarball_sum
  changed_when: false
  check_mode: false

- name: firecracker — assert local checksum matches pin
  ansible.builtin.assert:
    that:
      - "fc_release_sha256 in tarball_sum.stdout"
    fail_msg: >-
      Downloaded firecracker tarball SHA-256 does not match the pin in
      roles/firecracker/defaults/main.yml. Refusing to continue — a
      download mismatch is almost certainly a compromised supply chain.

- name: firecracker — untar binary + jailer into /usr/local/bin
  ansible.builtin.unarchive:
    src: "/tmp/firecracker-{{ fc_release }}.tgz"
    dest: /usr/local/bin
    remote_src: true
    creates: "/usr/local/bin/firecracker-{{ fc_release }}"
  args:
    creates: "/usr/local/bin/firecracker-{{ fc_release }}"

- name: firecracker — symlink current fc_version binaries onto PATH
  ansible.builtin.file:
    src: "/usr/local/bin/firecracker-{{ fc_release }}"
    dest: "{{ item }}"
    state: link
    force: true
  loop:
    - /usr/local/bin/firecracker
    - /usr/local/bin/jailer

- name: firecracker — ensure kernel build dependencies
  ansible.builtin.package:
    name:
      - build-essential
      - libssl-dev
      - libelf-dev
      - bc
      - kmod
      - cpio
      - xz-utils
      - flex
      - bison
    state: present

- name: firecracker — download kernel source tarball
  ansible.builtin.get_url:
    url: "{{ fc_kernel_tar_url }}"
    dest: "/tmp/linux-{{ fc_kernel_version }}.tar.xz"
    checksum: "sha256:{{ fc_kernel_tar_sha256 }}"
    owner: root
    group: root
    mode: "0644"
  register: kernel_tar

- name: firecracker — extract kernel source
  ansible.builtin.command: tar -xJf /tmp/linux-{{ fc_kernel_version }}.tar.xz -C /usr/src
  creates: "/usr/src/linux-{{ fc_kernel_version }}"

- name: firecracker — fetch FC kernel config
  ansible.builtin.get_url:
    url: "{{ fc_kernel_config_url }}"
    dest: "/tmp/config-{{ fc_kernel_version }}"
    owner: root
    group: root
    mode: "0644"
  register: kernel_config

- name: firecracker — apply FC kernel config
  ansible.builtin.command: cp /tmp/config-{{ fc_kernel_version }} /usr/src/linux-{{ fc_kernel_version }}/.config
  creates: "/usr/src/linux-{{ fc_kernel_version }}/.config"

- name: firecracker — ensure CONFIG_BLK_DEV_VIRTIO=y (built-in, not module)
  ansible.builtin.lineinfile:
    path: /usr/src/linux-{{ fc_kernel_version }}/.config
    regexp: "^CONFIG_BLK_DEV_VIRTIO=.*"
    line: "CONFIG_BLK_DEV_VIRTIO=y"
    state: present
  register: virtio_config

- name: firecracker — ensure CONFIG_VIRTIO_BLK=y (built-in, not module)
  ansible.builtin.lineinfile:
    path: /usr/src/linux-{{ fc_kernel_version }}/.config
    regexp: "^CONFIG_VIRTIO_BLK=.*"
    line: "CONFIG_VIRTIO_BLK=y"
    state: present

- name: firecracker — build kernel (vmlinux) with 4 jobs
  ansible.builtin.command: make -j4 ARCH=x86_64 CROSS_COMPILE= olddefconfig 2>&1
  args:
    chdir: /usr/src/linux-{{ fc_kernel_version }}
    creates: "/usr/src/linux-{{ fc_kernel_version }}/vmlinux"

- name: firecracker — build vmlinux
  ansible.builtin.command: make -j4 ARCH=x86_64 CROSS_COMPILE= bzImage 2>&1
  args:
    chdir: /usr/src/linux-{{ fc_kernel_version }}
    creates: "/usr/src/linux-{{ fc_kernel_version }}/arch/x86/boot/bzImage"
  register: kernel_build

- name: firecracker — copy vmlinux to /srv/fc/base
  ansible.builtin.copy:
    src: "/usr/src/linux-{{ fc_kernel_version }}/arch/x86/boot/bzImage"
    dest: "/srv/fc/base/vmlinux-{{ fc_kernel_version }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  register: vmlinux_copy

- name: firecracker — compute and pin kernel SHA-256
  ansible.builtin.command: sha256sum /srv/fc/base/vmlinux-{{ fc_kernel_version }}
  register: vmlinux_sum
  changed_when: false

- name: firecracker — warn about pinning kernel SHA-256
  ansible.builtin.debug:
    msg: |
      Kernel built successfully. UPDATE defaults/main.yml with this SHA-256:
      fc_kernel_sha256: "{{ vmlinux_sum.stdout.split()[0] }}"
  when: fc_kernel_sha256.startswith("REPLACE")

- name: firecracker — assert kernel checksum (if pinned)
  ansible.builtin.assert:
    that:
      - "fc_kernel_sha256 == vmlinux_sum.stdout.split()[0]"
    fail_msg: "Kernel SHA-256 mismatch. Run: sha256sum /srv/fc/base/vmlinux-{{ fc_kernel_version }}"
  when: not fc_kernel_sha256.startswith("REPLACE")

- name: "firecracker — smoke test (version check)"
  ansible.builtin.command: "{{ item }}"
  loop:
    - /usr/local/bin/firecracker --version
    - /usr/local/bin/jailer --version
  changed_when: false
  check_mode: false
