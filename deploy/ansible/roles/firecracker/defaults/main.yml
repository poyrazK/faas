# Pin: upgrade both fc_release AND fc_release_sha256 together.
# FC releases (v1.7.0+) do NOT bundle kernels - we BUILD from source using
# the FC CI kernel config. This ensures virtio-blk is built-in (not a module),
# which is required for the kernel to mount root during boot.
#
# Kernel source and config:
# - kernel source: https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.1.x.tar.xz
# - FC kernel config: https://raw.githubusercontent.com/firecracker-microvm/firecracker/v{{ fc_release }}/resources/guest_configs/microvm-kernel-ci-x86_64-6.1.config
# - Required config change: CONFIG_BLK_DEV_VIRTIO=y (must be built-in, not module)
#
# Build deps: make, gcc, flex, bison, libssl-dev, libelf-dev, bc, kmod, cpio, xz
fc_release: "v1.7.0"
fc_arch: "x86_64"
fc_release_sha256: "REPLACE_WITH_SHA256_OF_FC_v1.7.0_x86_64_TARBALL"
fc_kernel_version: "6.1.134"
fc_kernel_tar_url: "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-{{ fc_kernel_version }}.tar.xz"
fc_kernel_tar_sha256: "REPLACE_WITH_SHA256_OF_KERNEL_TARBALL"
# fc_kernel_sha256 is the pinned checksum of the BUILT kernel (set after first build)
fc_kernel_sha256: "REPLACE_WITH_SHA256_OF_BUILT_KERNEL"
fc_kernel_config_url: "https://raw.githubusercontent.com/firecracker-microvm/firecracker/v{{ fc_release }}/resources/guest_configs/microvm-kernel-ci-x86_64-6.1.config"
