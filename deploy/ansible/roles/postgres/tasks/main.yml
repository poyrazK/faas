# postgres (spec §1, §5).
#
# Installs postgres-15 and creates the `faas` system user + DB.
# The schema lands in M5 via migrations/00001_init.sql — this role
# only sets up the cluster trust boundary.
#
# Why postgres-15 specifically: spec §Conventions say "SQL via sqlc
# only", which requires PG ≥ 13 (gen_random_uuid + JSON builders);
# 15 is the Ubuntu 24.04 default and matches what schedd's ledger
# JSON queries expect.

- name: postgres — install postgres-15
  ansible.builtin.apt:
    name:
      - postgresql-15
      - postgresql-contrib-15
      - libpq-dev
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: postgres — start + enable
  ansible.builtin.service:
    name: postgresql
    enabled: true
    state: started
  register: pg_svc
  failed_when: false  # CI/chroot may not have systemd

- name: postgres — ensure system user `faas` exists
  ansible.builtin.user:
    name: faas
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/faas
    createhome: true
  register: faas_user

- name: postgres — create postgres role `faas`
  community.postgresql.postgresql_user:
    name: faas
    db: faas
    password: ""
    priv: ALL
    state: present
  become: true
  become_user: postgres
  register: pg_role
  failed_when: false  # pg module may be missing in M0; manual `createuser` fallback below

- name: postgres — fallback: create role via psql if pg_user module unavailable
  ansible.builtin.command: >
    sudo -u postgres psql -c "CREATE ROLE faas LOGIN INHERIT;"
  changed_when: false
  failed_when: false
  when: pg_role is failed

- name: postgres — create database `faas`
  ansible.builtin.command: >
    sudo -u postgres psql -c "CREATE DATABASE faas OWNER faas;"
  changed_when: false
  failed_when: false

- name: postgres — make /run/postgresql writable for faas (peer auth)
  ansible.builtin.file:
    path: /run/postgresql
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"
