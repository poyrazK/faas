# node_exporter (spec §12 — host-level telemetry).
#
# Binds ONLY to the bridge IP — the public-facing iface's input
# chain policy `drop` would block Prometheus's scrape otherwise.
# Pinned to a specific version via SHA-256 (same supply-chain
# discipline as the firecracker + prometheus roles).

- name: node_exporter — read defaults
  ansible.builtin.debug:
    var: node_exporter_version

- name: node_exporter — create system user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/node_exporter
    createhome: false
  register: ne_user

- name: node_exporter — download tarball
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    checksum: "sha256:{{ node_exporter_release_sha256 }}"
    mode: "0644"
  register: ne_tarball

- name: node_exporter — assert checksum
  ansible.builtin.command: sha256sum /tmp/node_exporter-{{ node_exporter_version }}.tar.gz
  register: ne_sum
  changed_when: false
  check_mode: false

- name: node_exporter — verify pin matches downloaded
  ansible.builtin.assert:
    that:
      - "node_exporter_release_sha256 in ne_sum.stdout"
    fail_msg: "Downloaded node_exporter tarball SHA-256 mismatch — supply chain check failed."

- name: node_exporter — untar
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
  args:
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"

- name: node_exporter — install binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: node_exporter — install systemd unit
  ansible.builtin.copy:
    src: node_exporter.service
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon-reload
    - restart node_exporter

- name: node_exporter — enable + start
  ansible.builtin.service:
    name: node_exporter
    enabled: true
    state: started
  register: ne_svc
  failed_when: false  # chroot/CI may lack systemd

- name: node_exporter — verify scrape port responds
  ansible.builtin.uri:
    url: "http://{{ node_exporter_listen_addr }}/metrics"
    status_code: 200
  register: ne_metrics
  failed_when: false
  retries: 5
  delay: 2
  until: ne_metrics is succeeded