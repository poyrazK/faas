[defaults]
inventory = inventory
roles_path = .
stdout_callback = yaml
# Host-key checking is meaningless against the local box; turning it off
# keeps `make bootstrap` working straight out of a fresh image where sshd
# hasn't seen its own keys yet.
host_key_checking = False
# `make bootstrap` runs as root over sudo; forks=1 keeps the play easy
# to read in CI logs.
forks = 1
# Treat warnings (especially about deprecated ansible core features)
# as hard errors — we want to see drift, not paper over it.
deprecation_warnings = True
interpreter_python = /usr/bin/python3
