# faas-metal — a local Firecracker metal loop on macOS via Lima nested KVM.
#
# WHY: the platform's metal code (firecracker/jailer VM lifecycle) is gated
# behind `//go:build metal` and needs /dev/kvm, which macOS does not provide.
# On Apple Silicon M3+ / macOS 15+ the `vz` backend can grant *nested*
# virtualization, so an arm64 Linux guest gets its own /dev/kvm and can run
# aarch64 Firecracker. This gives a fast local loop for `make test-metal` /
# `make leakcheck` without the Hetzner EX44.
#
# CAVEAT (read this): the guest is **arm64**; the production EX44 is **x86_64**.
# This validates the arch-agnostic lifecycle logic (netns/jailer/fcvm/manager)
# and the Firecracker boot path — it does NOT produce production x86_64
# snapshots or exercise the pinned x86_64 kernel. The EX44 remains the source
# of truth for the metal acceptance gates (spec §14). Firecracker + kernel here
# are fetched WITHOUT the pinned-checksum discipline used in the ansible
# firecracker role — acceptable for a throwaway dev VM, never for the box.
#
# USAGE:
#   limactl start deploy/lima/faas-metal.yaml     # first run provisions (~few min)
#   limactl shell faas-metal                       # drop into the guest
#   # inside the guest, from your repo checkout under $HOME:
#   sudo -E env "PATH=$PATH" ./deploy/lima/run-metal.sh
#
# Delete with: limactl delete -f faas-metal

vmType: vz
arch: aarch64
nestedVirtualization: true

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: aarch64

cpus: 4
memory: "6GiB"
disk: "40GiB"

# Mount the host home read-write so the repo checkout is reachable and
# `go build` / `make` run against the live worktree.
mounts:
  - location: "~"
    writable: true

# Fail fast with a clear message if nested virt was not granted (older chips,
# macOS < 15, or the vz backend refusing it) rather than failing deep in a test.
probes:
  - description: "nested KVM present (/dev/kvm)"
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 60s bash -c "until test -e /dev/kvm; do sleep 2; done"; then
        echo >&2 "/dev/kvm never appeared — nested virtualization was not granted."
        echo >&2 "Needs Apple Silicon M3+ and macOS 15+. Fall back to the EX44."
        exit 1
      fi
    hint: |
      /dev/kvm is missing in the guest. Nested virtualization requires an
      M3-or-later Mac on macOS 15+. Use the EX44 (or a cloud KVM box) instead.

provision:
  # System setup: build toolchain, mkfs.ext4, iproute2, busybox (metal-test
  # rootfs fallback), kvm group, Go 1.25, and aarch64 Firecracker + kernel.
  # Also install + start postgres (the metal tests need a reachable socket
  # at /run/postgresql) and create the per-daemon faas-* users the jailer
  # chowns to.
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Lima's hostagent races its own apt-get installs (nerdctl, containerd
      # binaries downloaded by `limactl start`) against our per-boot
      # provision scripts. The shared dpkg lock is held when the per-boot
      # scripts fire, so a single apt-get call fails with
      # "Could not get lock /var/lib/dpkg/lock-frontend". Wait it out
      # rather than failing the whole block. Same helper covers all
      # three blocks; defined once here.
      apt_wait() {
        local deadline=$((SECONDS + 60))
        while [ "$SECONDS" -lt "$deadline" ]; do
          if ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
              && ! fuser /var/lib/dpkg/lock >/dev/null 2>&1; then
            return 0
          fi
          sleep 1
        done
        echo "apt_wait: dpkg lock still held after 60s" >&2
        return 1
      }

      export DEBIAN_FRONTEND=noninteractive
      apt_wait
      apt-get update -y
      apt_wait
      apt-get install -y --no-install-recommends \
        build-essential e2fsprogs iproute2 iptables nftables git curl ca-certificates \
        busybox-static jq postgresql

      # Per-daemon service accounts. vmmd runs the jailed firecracker +
      # chowns the chroot to the per-instance uid range (20000–29999), so
      # /srv/fc, /etc/faas, and the per-daemon config live here.
      for u in faas faas-apid faas-schedd faas-vmmd faas-gatewayd faas-imaged; do
        if ! id -u "$u" >/dev/null 2>&1; then
          useradd -r -M -s /usr/sbin/nologin "$u"
        fi
      done
      groupadd -f faas || true
      for u in faas-apid faas-schedd faas-vmmd faas-gatewayd faas-imaged; do
        usermod -aG faas "$u" 2>/dev/null || true
      done
      install -d -m 0755 -o root -g root /etc/faas
      install -d -m 0755 -o faas-vmmd -g faas /srv/fc/base
      install -d -m 0755 -o faas-vmmd -g faas /srv/fc/jail
      install -d -m 0755 -o faas-vmmd -g faas /srv/fc/snap
      install -d -m 0755 -o faas-vmmd -g faas /srv/fc/layers

      # Postgres: edit-until-idempotent config, start, create role/db. The
      # metal test suite expects /run/postgresql (default Debian location).
      install -d -m 0755 -o postgres -g postgres /var/run/postgresql
      ln -sfn /var/run/postgresql /run/postgresql
      cat >/etc/postgresql/16/main/pg_hba.conf <<EOF
      local all all trust
      host all all 127.0.0.1/32 trust
      host all all ::1/128 trust
      EOF
      pg_ctlcluster 16 main start || true
      sleep 1
      # pg_ctlcluster start happens BEFORE the HBA file is rewritten above,
      # so postgres is up with the default `peer` auth on local sockets and
      # reloads the new HBA only on next SIGHUP. Force the reload here so
      # the `local all all trust` rule below is active before any daemons
      # (or the test runner) try to connect.
      pg_ctlcluster 16 main reload || true
      sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='faas'" \
        | grep -q 1 || sudo -u postgres psql -c "CREATE ROLE faas LOGIN SUPERUSER"
      sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='faas'" \
        | grep -q 1 || sudo -u postgres createdb faas
      sudo -u postgres psql -c "GRANT ALL ON DATABASE faas TO faas" || true

      # Let the default (non-root) Lima user open /dev/kvm without sudo.
      # The Lima cloud-init image's "regular" login user varies across
      # versions — Ubuntu Noble images historically created `ubuntu` with
      # uid≥1000, but updated images (Lima 1.0+) name the user after the
      # host's macOS user (`poyrazk.linux` / `poyrazk`, uid 501) and
      # create it asynchronously with our per-boot scripts. The awk
      # '$3>=1000' filter rejects uid 501, and the lookup often returns
      # empty before cloud-init's user-setup module runs.
      #
      # Resolution: scan for a uid>=500 shell-user with a real login shell,
      # fall back to `poyrazk` (the current Lima default), then `ubuntu`
      # (legacy). That covers all three cases without rewriting this on
      # every Lima bump.
      groupadd -f kvm || true
      DEFAULT_USER="$(getent passwd | awk -F: '$3>=500 && $3<65000 && $7 ~ /(bash|zsh|sh)$/ {print $1; exit}')"
      DEFAULT_USER="${DEFAULT_USER:-poyrazk}"
      DEFAULT_USER="${DEFAULT_USER:-ubuntu}"
      usermod -aG kvm "${DEFAULT_USER}" || true

      # Go 1.25.7 (matches go.mod), arm64.
      GO_VER=go1.25.7
      if ! /usr/local/go/bin/go version 2>/dev/null | grep -q "$GO_VER"; then
        curl -fsSL "https://go.dev/dl/${GO_VER}.linux-arm64.tar.gz" -o /tmp/go.tgz
        rm -rf /usr/local/go
        tar -C /usr/local -xzf /tmp/go.tgz
        rm -f /tmp/go.tgz
      fi
      ln -sf /usr/local/go/bin/go /usr/local/bin/go
      ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt

      # aarch64 Firecracker + jailer (repo pins v1.7.0; dev VM, unpinned checksum).
      FC_VER=v1.7.0
      mkdir -p /usr/local/bin /srv/fc/base /srv/fc/jail
      if [ ! -x "/usr/local/bin/firecracker-${FC_VER}" ]; then
        curl -fsSL "https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VER}/firecracker-${FC_VER}-aarch64.tgz" -o /tmp/fc.tgz
        tar -C /tmp -xzf /tmp/fc.tgz
        install -m0755 "/tmp/release-${FC_VER}-aarch64/firecracker-${FC_VER}-aarch64" "/usr/local/bin/firecracker-${FC_VER}"
        install -m0755 "/tmp/release-${FC_VER}-aarch64/jailer-${FC_VER}-aarch64" "/usr/local/bin/jailer-${FC_VER}"
        rm -rf /tmp/fc.tgz "/tmp/release-${FC_VER}-aarch64"
      fi
      ln -sf "/usr/local/bin/firecracker-${FC_VER}" /usr/local/bin/firecracker
      ln -sf "/usr/local/bin/jailer-${FC_VER}" /usr/local/bin/jailer

      # aarch64 guest kernel (6.1.x per spec §4.4) from the Firecracker CI bucket.
      KERNEL=/srv/fc/base/vmlinux-6.1.128
      if [ ! -f "$KERNEL" ]; then
        curl -fsSL "https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.12/aarch64/vmlinux-6.1.128" -o "$KERNEL"
      fi

      firecracker --version | head -1
      go version

  # Build the V6 acceptance rootfs (spec §14 V6, ADR-022). This is the
  # rootfs TestMetalTwoRestoresDistinctUUID uses: PID 1 = the real
  # faas-guest-init (so the AF_VSOCK resume listener is wired), app entry-
  # point writes /etc/faas/uuid.txt and busybox httpd-serves /. Built once
  # per `limactl start` and reused across every subsequent metal run.
  #
  # We build guest-init against the host-mounted repo checkout (the Lima
  # mount: ~ entry exposes the host $HOME — including the repo worktree)
  # so the guest binary's wire format matches pkg/fcvm/vmm.go's
  # TriggerResumeHook byte-for-byte. Re-runs after a guest-init source
  # change require re-provisioning the Lima VM (limactl delete + start) —
  # documented in deploy/lima/README.md.
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Same dpkg-lock helper as the FC-setup block — Lima's hostagent
      # can still be holding the lock when this block runs.
      apt_wait() {
        local deadline=$((SECONDS + 60))
        while [ "$SECONDS" -lt "$deadline" ]; do
          if ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
              && ! fuser /var/lib/dpkg/lock >/dev/null 2>&1; then
            return 0
          fi
          sleep 1
        done
        echo "apt_wait: dpkg lock still held after 60s" >&2
        return 1
      }

      # Default user has a writable mount of host $HOME at the same path
      # (Lima `mounts: writable: true`). The repo worktree is mounted under
      # the host uid; the lima-default user mirrors that uid. The awk
      # '$3>=1000' filter rejects the current Lima image's `poyrazk` user
      # (uid 501) — see the FC-setup block for the same fix.
      DEFAULT_USER="$(getent passwd | awk -F: '$3>=500 && $3<65000 && $7 ~ /(bash|zsh|sh)$/ {print $1; exit}')"
      DEFAULT_USER="${DEFAULT_USER:-poyrazk}"
      DEFAULT_USER="${DEFAULT_USER:-ubuntu}"
      DEFAULT_HOME="$(getent passwd "${DEFAULT_USER}" | cut -d: -f6)"
      DEFAULT_HOME="${DEFAULT_HOME:-/home/${DEFAULT_USER}}"
      apt_wait

      # Search the default user's home for the repo (typical layout: ~/code/faas
      # or the worktree is directly at $HOME). We probe a few known locations so
      # operators don't have to set FAAS_REPO_ROOT for the common cases.
      REPO=""
      for candidate in \
        "${DEFAULT_HOME}/faas" \
        "${DEFAULT_HOME}/code/faas" \
        "${DEFAULT_HOME}/work/faas" \
        "${DEFAULT_HOME}/src/faas"; do
        if [ -f "${candidate}/guest/init/main_linux.go" ]; then
          REPO="${candidate}"
          break
        fi
      done
      if [ -z "$REPO" ]; then
        echo >&2 "Could not locate faas repo checkout under ${DEFAULT_HOME}."
        echo >&2 "Place the repo at one of: ~/faas, ~/code/faas, ~/work/faas, ~/src/faas."
        echo >&2 "Or set FAAS_REPO_ROOT in the Lima env and re-provision."
        exit 1
      fi
      echo "V6 rootfs build: repo=${REPO}"

      # Build guest-init (pure-Go static, CGO_ENABLED=0).
      GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
        go build -trimpath -tags linux -o /tmp/faas-guest-init "${REPO}/guest/init"
      install -m0755 /tmp/faas-guest-init /usr/local/bin/faas-guest-init

      # Build function-runner shims (per-runtime). These live at
      # /usr/local/bin/faas-runner inside the per-app ext4 (drive1); the
      # M8 PR wires them via FAAS_FUNCTION_RUNNER_NODE22 / _PYTHON312.
      # Same build matrix as guest-init (linux/arm64, CGO off, trimpath).
      for rt in node22 python312; do
        GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
          go build -trimpath -o "/tmp/faas-runner-${rt}" "${REPO}/guest/runners/${rt}"
        install -m0755 "/tmp/faas-runner-${rt}" "/usr/local/bin/faas-runner-${rt}"
      done

      # Stage the V6 rootfs skeleton: busybox + guest-init + /etc/faas/app.json.
      # The image is built ONCE per `limactl start`; after that, `make metal-lima`
      # just reuses the staged files. To rebuild after a guest-init source change,
      # delete + re-provision (`limactl delete -f faas-metal && limactl start ...`).
      V6_BASE=/srv/fc/base/v6-base.ext4
      V6_LAYER=/srv/fc/base/v6-layer.ext4
      if [ -f "$V6_BASE" ] && [ -f "$V6_LAYER" ]; then
        echo "V6 rootfs already staged; skipping rebuild."
        echo "  base : $V6_BASE"
        echo "  layer: $V6_LAYER"
        exit 0
      fi

      WORK="$(mktemp -d)"
      LWORK="$(mktemp -d)"
      trap 'rm -rf "$WORK" "$LWORK"' EXIT

      mkdir -p "${WORK}/bin" "${WORK}/sbin" "${WORK}/dev" "${WORK}/sys" \
               "${WORK}/proc" "${WORK}/etc" "${WORK}/etc/faas" "${WORK}/tmp"
      cp /usr/local/bin/faas-guest-init "${WORK}/sbin/init"
      chmod 0755 "${WORK}/sbin/init"

      cp "$(command -v busybox)" "${WORK}/bin/busybox"
      chmod 0755 "${WORK}/bin/busybox"
      for name in bin/sh bin/ash bin/cat; do
        ln -s /bin/busybox "${WORK}/${name}"
      done

      # The V6 entrypoint: capture /proc/sys/kernel/random/uuid AFTER the
      # resume hook fires, then busybox httpd-serve / on :8080 so waitReady
      # can probe (and the test can fetch /etc/faas/uuid.txt).
      # Single-line printf (not a heredoc) because the JSON braces trip
      # YAML's flow-mapping indicator inside the script: | literal block —
      # yaml.v2 refuses to parse a `{` at column 1 of a literal value.
      printf '%s\n' '{"entrypoint":["/bin/sh","-c","cat /proc/sys/kernel/random/uuid > /etc/faas/uuid.txt && exec /bin/busybox httpd -f -p 8080 -h /"],"port":8080}' >"${WORK}/etc/faas/app.json"

      # Pre-size and mkfs. ^has_journal matches the busybox helper — drive0
      # is read-only in the two-drive scheme, journal replay panics on ro mount.
      truncate -s 64M "$V6_BASE"
      mkfs.ext4 -O '^has_journal' -d "$WORK" -L faas-v6 -F "$V6_BASE" >/dev/null
      chmod 0644 "$V6_BASE"

      # The deploy-wake acceptance test (cmd/e2e/deploy_wake_metal_test.go)
      # uses sched.Engine.Prime, which hands vmmd BasePath = basePath("") =
      # /srv/fc/base/base.ext4 (no runtime) by default and .ext4 for
      # node22. Symlink both to the same v6-base so a single staged image
      # services every cold-boot path.
      install -m 0644 -o faas-vmmd -g faas "$V6_BASE" /srv/fc/base/base.ext4
      install -m 0644 -o faas-vmmd -g faas "$V6_BASE" /srv/fc/base/runner-node22.ext4

      # Writable layer upper — the guest's overlay writes here. Small is fine.
      mkdir -p "${LWORK}/etc" "${LWORK}/etc/faas" "${LWORK}/tmp"
      truncate -s 16M "$V6_LAYER"
      mkfs.ext4 -O '^has_journal' -d "$LWORK" -L faas-v6-layer -F "$V6_LAYER" >/dev/null
      chmod 0644 "$V6_LAYER"
      chown faas-vmmd:faas "$V6_LAYER" "$V6_BASE"

      ls -la /srv/fc/base/

  # Build the M6 builder base rootfs (spec §4.5, ADR-003, issue #57 pre-flight).
  # imaged::EnsureBaseExt4 normally pulls ghcr.io/onebox-faas/builder-base:latest
  # at startup and assembles /srv/fc/base/builder-base.ext4. That path requires
  # the ghcr.io image to already be pushed + reachable; the Lima guest has no
  # credentials and pushing per-dev is not the right model. Instead we build
  # the same image locally from images/builder-base.Dockerfile with buildx and
  # flatten it to a directory, then mkfs.ext4 -d into the ext4. The wire format
  # of the resulting rootfs matches what the EX44's imaged produces: every
  # layer flattened, no OCI manifest, mkfs has_journal disabled (the
  # two-drive drive0 is read-only — journal replay would panic).
  #
  # This blocks test #57 (M6 orchestrator e2e: apid → pg_notify → builderd →
  # vmmd → firecracker → Railpack/buildctl → OCI image.tar). Without
  # builder-base.ext4 on disk, builderd's vm_metal.go path errors at the
  # cold-boot step and the harness cannot exercise the in-VM build flow.
  #
  # Idempotent: if /srv/fc/base/builder-base.ext4 exists with label
  # "faas-builder-bas" we skip (re-provisioning doesn't churn it). Delete + re-
  # provision to force a rebuild after an images/builder-base.Dockerfile change.
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      BASE=/srv/fc/base/builder-base.ext4
      # Don't trust a stale file from an earlier provisioning run; the label
      # check is the cheap gate (debugfs already showed it was 'applayer'
      # at one point — clearly the wrong image). A 16MB applayer file is the
      # signal that something else wrote into this slot.
      if [ -f "$BASE" ] && [ "$(e2label "$BASE" 2>/dev/null || true)" = "faas-builder-bas" ]; then
        SIZE=$(stat -c%s "$BASE")
        if [ "$SIZE" -gt 100000000 ]; then
          echo "builder-base already staged ($SIZE bytes, label faas-builder-bas); skipping rebuild."
          exit 0
        fi
        echo "builder-base present but only $SIZE bytes — overwriting with a real build."
      fi

      # Same dpkg-lock helper as the FC-setup block — this block runs
      # after both prior blocks and can hit the same lock contention.
      apt_wait() {
        local deadline=$((SECONDS + 60))
        while [ "$SECONDS" -lt "$deadline" ]; do
          if ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
              && ! fuser /var/lib/dpkg/lock >/dev/null 2>&1; then
            return 0
          fi
          sleep 1
        done
        echo "apt_wait: dpkg lock still held after 60s" >&2
        return 1
      }

      export DEBIAN_FRONTEND=noninteractive
      # e2fsprogs is needed locally too (mkfs.ext4 + e2label below) — the
      # first provisioner block already installs it, but this block runs
      # on its own when /srv/fc/base/builder-base.ext4 is missing; relying
      # on a sibling block's install is a hidden coupling.
      apt_wait
      apt-get install -y --no-install-recommends docker.io e2fsprogs >/dev/null
      # Lima's default user already exists in the kvm group; add them to
      # docker so `docker buildx` works without sudo. Mirrors the kvm-group
      # step in the first provisioner block. The same uid>=1000 vs
      # poyrazk(uid 501) caveat applies — see the FC-setup block.
      DEFAULT_USER="$(getent passwd | awk -F: '$3>=500 && $3<65000 && $7 ~ /(bash|zsh|sh)$/ {print $1; exit}')"
      DEFAULT_USER="${DEFAULT_USER:-poyrazk}"
      DEFAULT_USER="${DEFAULT_USER:-ubuntu}"
      usermod -aG docker "${DEFAULT_USER}" || true

      REPO=""
      DEFAULT_HOME="$(getent passwd "${DEFAULT_USER}" | cut -d: -f6)"
      DEFAULT_HOME="${DEFAULT_HOME:-/home/${DEFAULT_USER}}"
      for candidate in \
        "${DEFAULT_HOME}/faas" \
        "${DEFAULT_HOME}/code/faas" \
        "${DEFAULT_HOME}/work/faas" \
        "${DEFAULT_HOME}/src/faas"; do
        if [ -f "${candidate}/guest/init/main_linux.go" ]; then
          REPO="${candidate}"
          break
        fi
      done
      if [ -z "$REPO" ]; then
        echo >&2 "builder-base build: could not locate faas repo checkout under ${DEFAULT_HOME}."
        exit 1
      fi
      echo "builder-base build: repo=${REPO}"

      # guest-init must exist at ${REPO}/guest/init/faas-guest-init (the
      # Dockerfile COPY target). Build it with the same flags as the V6
      # provisioner block — arm64, cgo off, the static-binary contract
      # guest/init expects. If the binary is already staged from an earlier
      # provisioner run this is a no-op overwrite.
      if [ ! -x "${REPO}/guest/init/faas-guest-init" ]; then
        GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
          go build -trimpath -tags linux -o "${REPO}/guest/init/faas-guest-init" \
          "${REPO}/guest/init"
      fi

      # buildx in the guest has no builder registered by default; create one
      # bound to the docker driver so --platform=linux/arm64 resolves locally
      # rather than asking the docker-container driver for a missing remote.
      # Don't chain `|| docker buildx use faas` after the `create --use`
      # line — it re-runs the use step on every invocation even when create
      # succeeded. Drive create/use in two separate guarded steps.
      if ! docker buildx create --name faas --driver docker --use >/dev/null 2>&1; then
        # `create` failed (e.g. the builder already exists from a previous
        # run). Switch to it rather than aborting the reprovision.
        docker buildx use faas >/dev/null 2>&1 || true
      fi

      STAGE="$(mktemp -d)"
      trap 'rm -rf "$STAGE"' EXIT

      # type=local,dest=… writes the unpacked, target-arch rootfs tree directly
      # to a directory. Single command, no OCI manifest to parse, no layer
      # apply loop to keep in lockstep with pkg/rootfs.ApplyLayerGz — buildx
      # does the layer flatten for us. The arm64 build is intentional: this
      # is the arm64 Lima guest, not the EX44.
      docker buildx build \
        --platform=linux/arm64 \
        --builder faas \
        --load=false \
        --output "type=local,dest=${STAGE}" \
        -f "${REPO}/images/builder-base.Dockerfile" \
        "${REPO}" >/dev/null

      # Sanity: buildkit + railpack + guest-init must be in the tree. If any
      # of these are missing the build above silently produced a wrong layer
      # (the COPY gitref args above are the usual culprit) — fail loud.
      for must in /usr/local/bin/buildkitd /usr/local/bin/buildctl \
                  /usr/local/bin/railpack /usr/local/bin/faas-guest-init; do
        if [ ! -e "${STAGE}${must}" ]; then
          echo >&2 "builder-base build: ${must} missing from unpacked tree."
          echo >&2 "Is images/builder-base.Dockerfile current? Was guest-init built?"
          exit 1
        fi
      done

      # Drive0 is mounted read-only — mkfs with ^has_journal so the kernel
      # doesn't try to replay on mount and panic. Matches the V6 rootfs
      # provisioner block.
      SIZE_MB=$(du -sm "$STAGE" | awk '{print $1 + 64}')  # content + 64 MB slack
      if [ "$SIZE_MB" -lt 256 ]; then SIZE_MB=256; fi
      truncate -s "${SIZE_MB}M" "$BASE"
      mkfs.ext4 -O '^has_journal' -d "$STAGE" -L faas-builder-bas -F "$BASE" >/dev/null
      chmod 0644 "$BASE"

      # imaged::EnsureBaseExt4's idempotency check reads
      # ${outImage}.digest and matches it against the remote config digest.
      # On Lima we have no remote, so the sidecar is meaningless — but write
      # a sentinel so an operator inspecting the dir sees the path is owned
      # by the local build, not a half-pulled registry stage.
      echo "local-lima-build:$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "${BASE}.digest"

      ls -la /srv/fc/base/
      echo "builder-base staged: $(stat -c%s "$BASE") bytes, label faas-builder-bas"
